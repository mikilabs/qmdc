site_name: QMDC Documentation
site_description: A Markdown-native context graph for humans and agents — write Markdown, query it with SQL, navigate it over MCP.
site_url: https://qmdc.mikilabs.io/
repo_url: https://github.com/mikilabs/qmdc
repo_name: mikilabs/qmdc
edit_uri: blob/main/docs/
theme:
  name: material
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  font:
    text: Noto Sans
    code: Roboto Mono
  icon:
    logo: qmdc/ref
  features:
  - content.code.copy
  - navigation.footer
  - content.action.edit
extra_css:
- css/brand.css
plugins:
- search
- glightbox
- qmdc:
    hidden_kinds: [ContentGenerator]
markdown_extensions:
- md_in_html
- pymdownx.details
- admonition
- attr_list
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.superfences
# Mermaid rendering (div.mermaid + zoom/pan viewport) is provided by the `qmdc`
# plugin, which registers the mermaid superfence and injects the renderer assets.
